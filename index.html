<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>&gt;$6000元的快速分揀系統</title>
    
    <!-- 引入 React 核心 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- 引入 Babel 以解析 JSX (固定穩定版本並確保無 import 錯誤) -->
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 PapaParse 用於解析 CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- 引入 Tesseract.js 用於 OCR 影像文字辨識 -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- 引入 AOS 動畫庫 -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>
        body { background-color: #f8fafc; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .camera-container { position: relative; width: 100%; height: 220px; background: #1e293b; border-radius: 0.75rem; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scan-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); pointer-events: none; }
        .scan-box { width: 65%; height: 35%; border: 2px dashed #60a5fa; border-radius: 12px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.3); }
        .scan-line { width: 100%; height: 2px; background: #60a5fa; position: absolute; top: 0; animation: scan 2s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        /* 卡片懸停動畫 */
        .hover-card { transition: all 0.3s ease; }
        .hover-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        /** @jsxRuntime classic */
        /** @jsx React.createElement */
        /** @jsxFrag React.Fragment */

        const { useState, useEffect, useRef, useMemo } = React;

        // =========================================================================
        // ★★★ 請將以下區塊的內容替換為您完整 CSV 檔案的文字 ★★★
        // 操作方式：將「處理後名單.csv」用記事本打開 -> 全選複製 -> 貼到兩個反引號 (`) 之間
        // =========================================================================
        const rawCSV = `郵政編號,姓名,地址,地區或備註,N區碼,N組碼
009036,李玹緯,200基隆市仁愛區南榮路463巷25號3樓,基隆,A,01
009037,謝明季,200基隆市仁愛區南新街318號,,A,01
009038,郭懷澤,200基隆市仁愛區孝二路29巷9-2號3樓,,A,01
008535,郭奕辰,946屏東縣恆春鎮墾丁路6號（大廳酒吧-郭奕辰）,,W,05
008536,陳品帆,947屏東縣滿州鄉里德村005鄰山頂路１７號,,W,05`; 
        // =========================================================================

        const App = () => {
            const [db, setDb] = useState([]);
            const [scannedIds, setScannedIds] = useState(new Set());
            const [currentName, setCurrentName] = useState("");
            
            const [ocrLoading, setOcrLoading] = useState(false);
            const [cameraActive, setCameraActive] = useState(false);
            const videoRef = useRef(null);

            // 初始化：解析內建的 CSV 資料，並啟動 AOS 動畫
            useEffect(() => {
                AOS.init({ duration: 600, once: true, offset: 50 });
                
                Papa.parse(rawCSV.trim(), {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const parsedDb = results.data.map((row, index) => {
                            // 清理 BOM
                            const cleanRow = {};
                            for (let key in row) {
                                cleanRow[key.replace(/^\uFEFF/, '').trim()] = row[key];
                            }
                            return {
                                id: cleanRow['郵政編號'] || `NO_ID_${index}`,
                                name: cleanRow['姓名'] ? cleanRow['姓名'].trim() : '',
                                nArea: cleanRow['N區碼'] || '',
                                nGroup: cleanRow['N組碼'] || '',
                                excelRow: index + 2 // 對應 Excel 的列數
                            };
                        }).filter(r => r.name !== ''); 
                        setDb(parsedDb);
                    }
                });
            }, []);

            // 強化版相機啟動機制 (支援手機端 Fallback)
            const startCamera = async () => {
                // 檢查瀏覽器是否支援或是否在安全連線環境下
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert("您的瀏覽器不支援相機功能，或目前並非安全連線(HTTPS)。請確認您使用 Safari 或 Chrome 瀏覽器。");
                    return;
                }

                try {
                    let stream;
                    try {
                        // 第一階段：優先嘗試後置鏡頭
                        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    } catch (err1) {
                        // 第二階段：若找不到後置鏡頭或受限，改為請求任意可用的相機
                        console.warn("無法取得後置鏡頭，嘗試請求任意相機...", err1);
                        stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    }
                    
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        // 等待視訊資料載入後再播放，避免畫面黑屏
                        videoRef.current.onloadedmetadata = () => {
                            videoRef.current.play().catch(e => console.error("相機播放失敗:", e));
                        };
                        setCameraActive(true);
                    }
                } catch (err) {
                    console.error("相機權限錯誤:", err);
                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        alert("相機權限已被拒絕 🚫\n請至手機系統「設定」中，允許瀏覽器(Safari/Chrome)存取相機，並重新整理網頁。");
                    } else {
                        alert(`無法存取相機 (錯誤: ${err.message})。請檢查硬體或使用手寫輸入。`);
                    }
                }
            };

            const stopCamera = () => {
                if (videoRef.current && videoRef.current.srcObject) {
                    videoRef.current.srcObject.getTracks().forEach(track => track.stop());
                }
                setCameraActive(false);
            };

            const captureAndOCR = async () => {
                if (!videoRef.current) return;
                setOcrLoading(true);
                
                const canvas = document.createElement('canvas');
                canvas.width = videoRef.current.videoWidth;
                canvas.height = videoRef.current.videoHeight;
                canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
                const imgData = canvas.toDataURL('image/jpeg');

                try {
                    const result = await Tesseract.recognize(imgData, 'chi_tra');
                    const text = result.data.text.replace(/\s+/g, ''); 
                    
                    let foundName = db.find(row => text.includes(row.name))?.name;
                    
                    if (foundName) {
                        setCurrentName(foundName);
                    } else {
                        setCurrentName(text.substring(0, 10));
                        alert("未能精準比對到姓名，請手動確認或修正。");
                    }
                } catch (error) {
                    alert("OCR辨識失敗，請重試或改用手寫輸入。");
                }
                setOcrLoading(false);
            };

            // 判斷邏輯
            const resultData = useMemo(() => {
                if (!currentName.trim()) return null;
                const match = db.find(r => r.name === currentName.trim());

                if (!match) {
                    return {
                        status: 'ERROR',
                        message: '查無資料，請置於異常處理區域並通知月領6000元役男協助處理。',
                        bgColor: 'bg-red-50 border-red-200',
                        textColor: 'text-red-700',
                        icon: <svg className="w-8 h-8 text-red-500 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                    };
                }

                const isDuplicate = scannedIds.has(match.id);
                const categoryText = (match.excelRow >= 2 && match.excelRow <= 966) ? '甲類' : '乙類';

                if (isDuplicate) {
                    return {
                        status: 'ERROR',
                        data: match,
                        category: categoryText,
                        message: '【發現重複信件】請置於異常處理區域並通知月領6000元役男協助處理。',
                        bgColor: 'bg-red-50 border-red-200',
                        textColor: 'text-red-700',
                        icon: <svg className="w-8 h-8 text-red-500 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    };
                }

                return {
                    status: 'SUCCESS',
                    data: match,
                    category: categoryText,
                    message: '檢核無誤！請確實封袋並置於指定類別寄出區域。',
                    bgColor: 'bg-green-50 border-green-200',
                    textColor: 'text-green-700',
                    icon: <svg className="w-8 h-8 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                };
            }, [currentName, db, scannedIds]);

            const handleConfirm = () => {
                if (resultData?.status === 'SUCCESS') {
                    setScannedIds(prev => new Set(prev).add(resultData.data.id));
                    setCurrentName("");
                    window.scrollTo({ top: 0, behavior: 'smooth' }); // 自動捲動回頂部
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 pb-24 font-sans text-slate-800">
                    {/* Header */}
                    <div className="bg-white/80 backdrop-blur-md shadow-sm p-4 sticky top-0 z-20 flex justify-between items-center border-b border-slate-200" data-aos="fade-down">
                        <div className="flex items-center space-x-2">
                            <svg className="w-6 h-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                            <h1 className="text-lg font-bold">&gt;$6000元的快速分揀系統</h1>
                        </div>
                        <span className="text-xs font-semibold text-slate-500 bg-slate-100 px-3 py-1 rounded-full border border-slate-200">
                            已處理 {scannedIds.size} / {db.length}
                        </span>
                    </div>

                    <div className="p-4 space-y-5">
                        {/* 1. 相機顯示區域 */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 hover-card" data-aos="fade-up">
                            <div className="flex justify-between items-center mb-3">
                                <h2 className="font-bold text-slate-700 flex items-center">
                                    <span className="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xs mr-2">1</span>
                                    相機掃描姓名
                                </h2>
                                <button 
                                    onClick={cameraActive ? stopCamera : startCamera}
                                    className={`px-4 py-1.5 text-xs font-bold rounded-full transition-all duration-300 transform hover:scale-105 active:scale-95 shadow-sm ${cameraActive ? 'bg-slate-200 text-slate-600 hover:bg-slate-300' : 'bg-blue-50 text-blue-600 border border-blue-200 hover:bg-blue-100'}`}
                                >
                                    {cameraActive ? '關閉相機' : '開啟相機'}
                                </button>
                            </div>
                            
                            <div className="camera-container mb-3 border border-slate-200">
                                {cameraActive ? (
                                    <>
                                        {/* ⚠️ 加入 muted 非常重要，否則 iOS Safari 不允許自動播放 */}
                                        <video ref={videoRef} autoPlay playsInline muted />
                                        <div className="scan-overlay">
                                            <div className="scan-box relative overflow-hidden">
                                                {ocrLoading && <div className="scan-line"></div>}
                                            </div>
                                        </div>
                                    </>
                                ) : (
                                    <div className="w-full h-full flex flex-col items-center justify-center text-slate-400">
                                        <svg className="w-10 h-10 mb-2 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                        <span className="text-sm">尚未開啟相機</span>
                                    </div>
                                )}
                            </div>

                            <button 
                                onClick={captureAndOCR}
                                disabled={!cameraActive || ocrLoading}
                                className={`w-full font-bold py-3.5 rounded-xl shadow-sm transition-all duration-300 flex justify-center items-center ${!cameraActive ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-800 text-white hover:bg-slate-900 hover:shadow-md hover:-translate-y-0.5 active:scale-95'}`}
                            >
                                {ocrLoading ? (
                                    <><svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 辨識中...</>
                                ) : '擷取影像並辨識'}
                            </button>
                        </div>

                        {/* 2. 手寫輸入區域 */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 hover-card" data-aos="fade-up" data-aos-delay="50">
                            <h2 className="font-bold text-slate-700 flex items-center mb-3">
                                <span className="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xs mr-2">2</span>
                                手寫/修正姓名
                            </h2>
                            <div className="relative">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg className="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                                </div>
                                <input 
                                    type="text" 
                                    value={currentName}
                                    onChange={(e) => setCurrentName(e.target.value)}
                                    placeholder="點此輸入姓名..."
                                    className="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow"
                                />
                                {currentName && (
                                    <button onClick={() => setCurrentName('')} className="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600">
                                        <svg className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* 3 & 4. 併排顯示區域 */}
                        <div className="grid grid-cols-2 gap-4" data-aos="fade-up" data-aos-delay="100">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 flex flex-col justify-center items-center hover-card">
                                <span className="text-xs text-slate-400 font-bold mb-2 tracking-wider">3. 辨識姓名</span>
                                <span className={`text-2xl font-bold truncate w-full text-center ${currentName ? 'text-slate-800' : 'text-slate-300'}`}>
                                    {currentName || '等待中'}
                                </span>
                            </div>

                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 flex flex-col justify-center items-center hover-card">
                                <span className="text-xs text-slate-400 font-bold mb-2 tracking-wider">4. N區碼 / N組碼</span>
                                <span className="text-xl font-black text-blue-600 truncate w-full text-center">
                                    {resultData?.data ? `${resultData.data.nArea} / ${resultData.data.nGroup}` : '- / -'}
                                </span>
                            </div>
                        </div>

                        {/* 5. 郵件分類顯示區 */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 flex justify-between items-center hover-card" data-aos="fade-up" data-aos-delay="150">
                            <div className="flex flex-col">
                                <span className="text-sm text-slate-500 font-bold mb-1">5. 郵件分類</span>
                                <span className="text-xs text-slate-400">甲類(2~966) / 乙類(967+)</span>
                            </div>
                            <div className={`px-5 py-2 rounded-xl text-xl font-black shadow-sm ${resultData?.category === '甲類' ? 'bg-amber-100 text-amber-700' : resultData?.category === '乙類' ? 'bg-purple-100 text-purple-700' : 'bg-slate-100 text-slate-400'}`}>
                                {resultData?.category || '未判定'}
                            </div>
                        </div>

                        {/* 6. 警示區域 */}
                        <div 
                            className={`rounded-2xl p-5 border-2 transition-all duration-300 hover-card ${resultData ? resultData.bgColor : 'bg-slate-50 border-slate-200'}`} 
                            data-aos="fade-up" 
                            data-aos-delay="200"
                        >
                            <div className="flex items-center mb-3">
                                {resultData ? resultData.icon : <svg className="w-8 h-8 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>}
                                <h2 className={`font-bold ml-2 ${resultData ? resultData.textColor : 'text-slate-500'}`}>6. 系統狀態</h2>
                            </div>
                            <p className={`text-lg font-bold leading-relaxed ${resultData ? resultData.textColor : 'text-slate-400'}`}>
                                {resultData ? resultData.message : '等待掃描或輸入，以進行防呆檢核。'}
                            </p>
                        </div>
                    </div>

                    {/* 綠燈專屬：確認完成按鈕 (FAB 浮動按鈕) */}
                    <div className={`fixed bottom-0 left-0 right-0 p-4 z-30 transition-transform duration-500 bg-gradient-to-t from-white via-white to-transparent ${resultData?.status === 'SUCCESS' ? 'translate-y-0' : 'translate-y-full'}`}>
                        <div className="max-w-md mx-auto">
                            <button 
                                onClick={handleConfirm}
                                className="w-full bg-green-500 hover:bg-green-600 text-white font-black text-xl py-4 rounded-2xl shadow-[0_10px_20px_rgba(34,197,94,0.3)] transform transition-all duration-300 hover:-translate-y-1 active:scale-95 flex justify-center items-center"
                            >
                                <svg className="w-6 h-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>
                                確認封袋 (換下一筆)
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

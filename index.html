    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse (處理 CSV 資料) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Tesseract.js (光學字元辨識 OCR) -->

    <style>
        /* 鎖定畫面，防止手機端滾動 */
        body { overflow: hidden; height: 100dvh; background-color: #f3f4f6; touch-action: pan-y; }
        
        /* 動畫效果區 */
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
        
        @keyframes pulse-alert { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .animate-pulse-alert { animation: pulse-alert 2s infinite; }
        
        @keyframes scan-line { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        .scanner-line { position: absolute; width: 100%; height: 2px; background: #22c55e; box-shadow: 0 0 10px #22c55e; animation: scan-line 3s linear infinite; }

        /* 相機預覽框設計 */
        .camera-container { position: relative; overflow: hidden; border-radius: 0.75rem; background: #000; }
        .camera-overlay { position: absolute; top: 20%; left: 10%; right: 10%; bottom: 20%; border: 2px dashed rgba(255,255,255,0.7); box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); z-index: 10; pointer-events: none;}
        
        /* 按鈕與選單互動 */
        .btn-interactive { transition: transform 0.1s; }
        .btn-interactive:active { transform: scale(0.95); }
        .suggestion-item:active { background-color: #e5e7eb; }

        /* 隱藏區塊 */
        .hidden-canvas { display: none; }
        
        /* 自訂捲軸隱藏但可滾動 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

    <script>
        // === 全域變數 ===
        let database = [];
        let ocrWorker = null;
        let videoStream = null;

        // === DOM 元素快取 ===
        const inputEl = document.getElementById('manual-input');
        const btnClear = document.getElementById('btn-clear');
        const suggestionBox = document.getElementById('suggestion-box');

        // === 初始化 ===
        async function initSystem() {
            const csvString = document.getElementById('csv-data').textContent.trim();
            Papa.parse(csvString, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    database = results.data.map((row, index) => {
                        const excelRow = index + 2; 
                        let type = '未知';
                        if (excelRow >= 2 && excelRow <= 966) type = '甲類';
                        else if (excelRow >= 967) type = '乙類';
                        
                        return {
                            rowNum: excelRow,
                            name: (row['姓名'] || '').trim(),
                            code: (row['N區碼'] || '') + (row['N組碼'] || ''),
                            type: type
                        };
                    });
                }
            });

            try {
                ocrWorker = await Tesseract.createWorker('chi_tra');
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 500);
            } catch (err) {
                setAlert('warning', '系統提示', 'OCR 載入失敗，請檢查網路。您仍可手動輸入搜尋。');
                document.getElementById('loading-overlay').style.display = 'none';
            }

            await startCamera();
        }

        // === 相機控制 ===
        async function startCamera() {
            const video = document.getElementById('camera-feed');
            if (videoStream) videoStream.getTracks().forEach(track => track.stop());

            const constraints = { video: { facingMode: { ideal: "environment" } }, audio: false };
            try {
                videoStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = videoStream;
            } catch (err) {
                try {
                    videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = videoStream;
                } catch (fallbackErr) {
                    setAlert('error', '相機錯誤', '無法存取相機！請允許瀏覽器相機權限。');
                }
            }
        }

        // === 影像擷取與 智慧 OCR ===
        async function captureAndRecognize() {
            if (!ocrWorker) {
                setAlert('warning', '系統提示', 'OCR 尚未準備好，請稍後。'); return;
            }
            const video = document.getElementById('camera-feed');
            if (!video.videoWidth) {
                setAlert('warning', '系統提示', '相機未就緒。'); return;
            }

            const btn = document.getElementById('btn-capture');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-1" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 智慧辨識中`;
            btn.disabled = true;

            const canvas = document.getElementById('capture-canvas');
            const context = canvas.getContext('2d');
            const cropWidth = video.videoWidth * 0.8;
            const cropHeight = video.videoHeight * 0.4;
            const startX = (video.videoWidth - cropWidth) / 2;
            const startY = (video.videoHeight - cropHeight) / 2;
            canvas.width = cropWidth; canvas.height = cropHeight;
            context.drawImage(video, startX, startY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);

            try {
                const dataUrl = canvas.toDataURL('image/jpeg');
                const { data: { text } } = await ocrWorker.recognize(dataUrl);
                const cleanText = text.replace(/[\s\n\r]/g, ''); // 去除空白

                if (cleanText.length === 0) throw new Error("無文字");

                // --- 智慧辨識引擎 ---
                // 1. 完美命中：OCR 文字完整包含資料庫中的某個名字 (例如辨識出 "李玹緯先生" -> 抓到 "李玹緯")
                let exactMatches = database.filter(db => db.name && cleanText.includes(db.name));
                
                if (exactMatches.length === 1) {
                    selectName(exactMatches[0]); // 直接選中並驗證
                    return;
                } else if (exactMatches.length > 1) {
                    // 罕見情況：畫面上有兩個名字，開啟選單讓使用者選
                    inputEl.value = cleanText;
                    renderSuggestions(exactMatches);
                    setAlert('warning', '偵測到多筆姓名', '畫面中包含多筆資料，請從選單點擊正確的姓名');
                    return;
                }

                // 2. 退化模糊比對：抓取 OCR 內的「連續 2~4 個中文字」去資料庫找有沒有包含這些字的
                const chineseBlocks = cleanText.match(/[\u4E00-\u9FA5]{2,4}/g);
                let fuzzyMatches = [];
                
                if (chineseBlocks) {
                    chineseBlocks.forEach(block => {
                        const matches = database.filter(db => db.name.includes(block));
                        fuzzyMatches.push(...matches);
                    });
                    // 移除重複
                    fuzzyMatches = Array.from(new Set(fuzzyMatches.map(a => a.name)))
                                        .map(name => fuzzyMatches.find(a => a.name === name));
                }

                if (fuzzyMatches.length === 1) {
                    // 模糊猜中一個
                    selectName(fuzzyMatches[0]);
                    setAlert('success', '智慧配對成功', `已自動修復辨識結果`);
                } else if (fuzzyMatches.length > 1) {
                    // 模糊猜中多個 -> 展開下拉選單
                    inputEl.value = chineseBlocks[0]; // 填入第一個片段
                    renderSuggestions(fuzzyMatches);
                    btnClear.classList.remove('hidden');
                    setAlert('warning', '模糊比對', `找到多筆相似資料，請從選單中點擊選擇`);
                } else {
                    setAlert('error', '辨識失敗', '無法從畫面中比對到資料庫中的姓名，請手動輸入');
                }
            } catch (err) {
                setAlert('error', '辨識錯誤', '未偵測到清晰文字，請手動輸入。');
            } finally {
                btn.innerHTML = originalHTML; btn.disabled = false;
            }
        }

        // === 智慧模糊搜尋引擎 (手動輸入用) ===
        function handleInputSearch(query) {
            query = query.trim();
            if (!query) {
                suggestionBox.classList.add('hidden');
                btnClear.classList.add('hidden');
                resetUI();
                return;
            }
            
            btnClear.classList.remove('hidden');

            // 模糊搜尋：只要名字「包含」輸入字元就列出 (優先列出開頭相同的)
            let matches = database.filter(item => item.name.includes(query));
            matches.sort((a, b) => {
                const aStarts = a.name.startsWith(query);
                const bStarts = b.name.startsWith(query);
                if (aStarts && !bStarts) return -1;
                if (!aStarts && bStarts) return 1;
                return 0;
            });

            if (matches.length > 0) {
                // 如果完全打對（唯一一筆精確吻合），且使用者不選單，我們可以直接顯示，但通常保留選單體驗更好
                // 這裡我們直接顯示選單
                renderSuggestions(matches, query);
            } else {
                suggestionBox.classList.add('hidden');
                updateResultsUI([], query); // 顯示查無此人
            }
        }

        // === 渲染下拉選單 ===
        function renderSuggestions(matches, highlightStr = "") {
            suggestionBox.innerHTML = ''; // 清空
            if (matches.length === 0) {
                suggestionBox.classList.add('hidden');
                return;
            }

            // 最多顯示 10 筆避免卡頓
            const limit = Math.min(matches.length, 10);
            for (let i = 0; i < limit; i++) {
                const data = matches[i];
                const li = document.createElement('li');
                li.className = "suggestion-item px-4 py-3 cursor-pointer flex justify-between items-center text-lg";
                
                // 處理字串高亮
                let displayName = data.name;
                if (highlightStr) {
                    const regex = new RegExp(`(${highlightStr})`, "g");
                    displayName = displayName.replace(regex, `<span class="text-blue-600 font-bold">$1</span>`);
                }

                li.innerHTML = `
                    <span class="font-medium">${displayName}</span>
                    <span class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-full">${data.code}</span>
                `;
                
                // 點擊事件：選中該人
                li.addEventListener('click', () => {
                    selectName(data);
                });
                suggestionBox.appendChild(li);
            }
            suggestionBox.classList.remove('hidden');
        }

        // === 執行選中動作 (選單點擊 或 OCR 確定) ===
        function selectName(dataObj) {
            inputEl.value = dataObj.name;
            suggestionBox.classList.add('hidden');
            btnClear.classList.remove('hidden');
            // 收起鍵盤 (手機端)
            inputEl.blur(); 
            // 更新下方 UI
            updateResultsUI([dataObj], dataObj.name);
        }

        // === UI 更新 ===
        function updateResultsUI(matches, originalQuery) {
            const nameEl = document.getElementById('display-name');
            const codeEl = document.getElementById('display-code');
            const typeEl = document.getElementById('display-type');

            if (matches.length === 1) {
                const data = matches[0];
                nameEl.textContent = data.name; codeEl.textContent = data.code; typeEl.textContent = data.type;
                setAlert('success', '驗證成功', '請確實封袋並置於指定類別寄出區域');
            } else if (matches.length > 1) {
                nameEl.textContent = "多筆符合"; codeEl.textContent = "異常"; typeEl.textContent = "異常";
                setAlert('error', '發現重複資料', `查到 ${matches.length} 筆相同姓名`);
            } else {
                nameEl.textContent = originalQuery || "查無此人"; codeEl.textContent = "無資料"; typeEl.textContent = "--";
                setAlert('error', '查無資料', '查無此人，請置於異常處理區域並通知月領6000元役男');
            }
        }

        function resetUI() {
            document.getElementById('display-name').textContent = '--';
            document.getElementById('display-code').textContent = '--';
            document.getElementById('display-type').textContent = '--';
            setAlert('idle', '等待分揀', '請掃描或輸入姓名以開始作業');
        }

        // === 狀態提示區塊 ===
        function setAlert(state, title, desc) {
            const area = document.getElementById('alert-area');
            const titleEl = document.getElementById('alert-title');
            const descEl = document.getElementById('alert-desc');
            const iconEl = document.getElementById('alert-icon');

            area.className = "flex-1 rounded-xl shadow-lg flex flex-col items-center justify-center p-4 text-center transition-colors duration-300 relative z-20";
            titleEl.textContent = title; descEl.textContent = desc;

            if (state === 'success') {
                area.classList.add('bg-green-500', 'text-white', 'animate-pulse-alert');
                iconEl.innerHTML = `<svg class="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            } else if (state === 'error' || state === 'warning') {
                const bgClass = state === 'warning' ? 'bg-yellow-500' : 'bg-red-600';
                area.classList.add(bgClass, 'text-white', 'animate-pulse-alert');
                iconEl.innerHTML = `<svg class="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            } else {
                area.classList.add('bg-gray-200', 'text-gray-600');
                iconEl.innerHTML = `<svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            }
        }

        // === 事件監聽器綁定 ===
        document.addEventListener('DOMContentLoaded', () => {
            initSystem();

            document.getElementById('btn-start-camera').addEventListener('click', startCamera);
            document.getElementById('btn-capture').addEventListener('click', captureAndRecognize);
            
            // 監聽輸入框打字事件
            inputEl.addEventListener('input', (e) => handleInputSearch(e.target.value));

            // 清除按鈕
            btnClear.addEventListener('click', () => {
                inputEl.value = '';
                suggestionBox.classList.add('hidden');
                btnClear.classList.add('hidden');
                resetUI();
                inputEl.focus();
            });

            // 點擊畫面其他地方時隱藏下拉選單
            document.addEventListener('click', (e) => {
                if (!inputEl.contains(e.target) && !suggestionBox.contains(e.target)) {
                    suggestionBox.classList.add('hidden');
                }
            });
            
            // 點擊輸入框如果裡面有字，再把它展開
            inputEl.addEventListener('focus', () => {
                if (inputEl.value.trim().length > 0) {
                    handleInputSearch(inputEl.value);
                }
            });
        });
    </script>
